name: "VBAN MQTT Bridge"
version: "0.1.0"
slug: "vban_mqtt_bridge"
description: "MQTT to VBAN bridge for Voicemeeter Potato"
arch:
  - aarch64
  - amd64
startup: application
boot: auto

options:
  vban:
    host: "192.168.11.10"
    port: 6980
    password: ""
  mqtt:
    prefix: "vban"
  features:
    mute: true
    solo: true
    gain: true
    restart: true
  strip: [0, 1, 2]
  bus: [0, 1, 2]

schema:
  vban:
    host: str
    port: int
    password: str?
  mqtt:
    prefix: str
  features:
    mute: bool
    solo: bool
    gain: bool
    restart: bool
  strip:
    - int
  bus:
    - int
